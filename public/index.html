    <title>AI Code Test Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        textarea, input { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px 15px; }
        pre { background-color: #f4f4f4; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>AI Manifest Demo</h1>
    <form id="task-form">
        <label for="customerName">Kundnamn:</label>
        <input type="text" id="customerName" name="customerName" required>
        
        <label for="requestDetails">Önskemål:</label>
        <textarea id="requestDetails" name="requestDetails" rows="4" required></textarea>
        
        <button type="submit">Generera Förslag</button>
    </form>
    
    <div id="result-container">
        <h2>Resultat:</h2>
        <pre id="result">Väntar på input...</pre>
    </div>
